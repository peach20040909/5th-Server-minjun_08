<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head><meta charset="UTF-8"><title>글쓰기</title><link rel="stylesheet" href="/style.css"></head>
<body>
<div class="container">
  <div class="header"><h1>✏️ 글쓰기</h1></div>
  <form th:action="@{/posts}" th:object="${postForm}" method="post">
    <div class="field">
      <label>제목</label>
      <input type="text" th:field="*{title}">
      <div class="error" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></div>
    </div>
    <div class="field">
      <label>내용</label>
      <textarea th:field="*{content}"></textarea>
      <div class="error" th:if="${#fields.hasErrors('content')}" th:errors="*{content}"></div>
    </div>
    <div class="actions">
      <button type="submit">등록</button>
      <a href="/posts"><button type="button" class="gray">취소</button></a>
    </div>
  </form>
</div>
</body>
</html>
