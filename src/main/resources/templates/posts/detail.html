<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head><meta charset="UTF-8"><title>게시글</title><link rel="stylesheet" href="/style.css"></head>
<body>
<div class="container">
  <div class="header"><h1 th:text="${post.title()}">제목</h1></div>
  <p class="meta">
    작성자 <b th:text="${post.writerNickname()}">작성자</b> ·
    <span th:text="${#temporals.format(post.createdAt(), 'yyyy-MM-dd HH:mm')}">날짜</span>
  </p>
  <div class="content-box" th:text="${post.content()}">내용</div>
  <div class="actions">
    <a href="/posts"><button class="gray">목록</button></a>
    <a th:if="${isWriter}" th:href="@{/posts/{id}/edit(id=${post.id()})}"><button>수정</button></a>
    <form th:if="${isWriter}" th:action="@{/posts/{id}/delete(id=${post.id()})}" method="post"
          onsubmit="return confirm('정말 삭제할까요?');" style="display:inline">
      <button type="submit" class="danger">삭제</button>
    </form>
  </div>
</div>
</body>
</html>
