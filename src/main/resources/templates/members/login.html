<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head><meta charset="UTF-8"><title>로그인</title><link rel="stylesheet" href="/style.css"></head>
<body>
<div class="container">
  <div class="header"><h1>🔑 로그인</h1></div>
  <form th:action="@{/login}" th:object="${loginForm}" method="post">
    <div class="error" th:if="${#fields.hasGlobalErrors()}">
      <p th:each="err : ${#fields.globalErrors()}" th:text="${err}"></p>
    </div>
    <div class="field">
      <label>이메일</label>
      <input type="text" th:field="*{email}">
      <div class="error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
    </div>
    <div class="field">
      <label>비밀번호</label>
      <input type="password" th:field="*{password}">
      <div class="error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
    </div>
    <div class="actions">
      <button type="submit">로그인</button>
      <a href="/signup"><button type="button" class="gray">회원가입</button></a>
    </div>
  </form>
</div>
</body>
</html>
