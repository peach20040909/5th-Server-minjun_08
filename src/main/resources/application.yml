spring:
  datasource:
    url: jdbc:h2:file:./data/board    # 파일로 저장 -> 서버 재시작해도 회원/글 유지됨
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true                   # http://localhost:8080/h2-console
  jpa:
    hibernate:
      ddl-auto: update                # 테이블 없으면 생성, 있으면 유지
    properties:
      hibernate:
        format_sql: true
    show-sql: true
